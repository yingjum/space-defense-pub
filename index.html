<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Space Hunters">
<meta name="theme-color" content="#14181f">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.webmanifest">
<title>Space Hunters</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0;
    -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  html,body { height:100%; width:100%; background:#14181f; color:#e6e9ef;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
    overflow:hidden; position:fixed; inset:0;
    -webkit-user-select:none; user-select:none; overscroll-behavior:none;
    touch-action:none; -webkit-text-size-adjust:100%; }
  #wrap { display:flex; align-items:center; justify-content:center;
    width:100vw; height:100vh; height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  #stage { position:relative; width:1240px; height:620px; flex:none; background:#1b212c;
    border:1px solid #2c3543; border-radius:10px; box-shadow:0 18px 50px rgba(0,0,0,.5);
    overflow:hidden; transform-origin:center center; }
  #rotate { position:fixed; inset:0; z-index:50; background:#14181f; color:#cfe;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    text-align:center; font-size:16px; padding:30px; }
  #rotate .ic { font-size:54px; animation:rot 2s ease-in-out infinite; }
  @keyframes rot { 0%,40%{transform:rotate(0)} 60%,100%{transform:rotate(90deg)} }
  canvas { display:block; position:absolute; top:0; left:0; }
  #side { position:absolute; right:0; top:0; width:280px; height:620px; background:#161b24;
    border-left:1px solid #2c3543; padding:12px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
  .hud { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { background:#222b38; border:1px solid #313c4c; border-radius:8px; padding:6px 8px;
    font-size:12px; flex:1 1 44%; text-align:center; }
  .chip b { display:block; font-size:16px; margin-top:2px; }
  .gold b{color:#f5c451;} .life b{color:#ff6b6b;} .wave b{color:#6cc6ff;} .mine b{color:#8ad6a0;}
  h3 { font-size:12px; color:#93a1b5; margin:3px 0 1px; letter-spacing:1px; }
  .towers { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  .tbtn { background:#232d3b; border:1px solid #344256; border-radius:8px; padding:7px 5px;
    cursor:pointer; text-align:center; font-size:12px; transition:.12s; user-select:none; }
  .tbtn:hover { background:#2c3a4d; }
  .tbtn.sel { border-color:#f5c451; background:#3a3320; }
  .tbtn.dis { opacity:.4; cursor:not-allowed; }
  .tbtn canvas { display:inline-block; vertical-align:middle; }
  .tbtn .cost { color:#f5c451; font-size:11px; }
  button.act { background:#2b6cb0; color:#fff; border:none; border-radius:8px; padding:9px;
    font-size:13px; cursor:pointer; width:100%; transition:.12s; }
  button.act:hover { background:#3b82d6; }
  button.act:disabled { background:#3a3f48; color:#7a8290; cursor:not-allowed; }
  button.ghost { background:#2a3340; } button.ghost:hover { background:#36404f; }
  #selPanel { background:#1d2531; border:1px solid #303b4b; border-radius:8px; padding:9px; font-size:12px; display:none; }
  #selPanel .row { display:flex; gap:6px; margin-top:7px; }
  #selPanel .row button { flex:1; padding:7px; font-size:12px; border-radius:6px; border:none; cursor:pointer; color:#fff; }
  .bUp{background:#3a7d44;} .bAmmo{background:#b08018;}
  .bSell{ background:#7a3636; }
  #selPanel .stat { color:#9fb0c4; line-height:1.65; }
  .bar { height:7px; background:#2a2f3a; border-radius:4px; margin-top:6px; overflow:hidden; }
  .bar>i { display:block; height:100%; width:100%; }
  .overlay { position:absolute; inset:0; background:rgba(12,15,20,.94); display:flex;
    flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:16px; padding:26px; z-index:20; }
  .overlay h1 { font-size:40px; letter-spacing:2px; }
  .overlay h1 small { display:block; font-size:14px; color:#8b97a8; letter-spacing:3px; margin-top:6px; font-weight:400; }
  .overlay p { color:#9fb0c4; max-width:600px; line-height:1.7; font-size:14px; }
  .mapsel { display:grid; grid-template-columns:repeat(5,138px); gap:11px;
    max-height:62vh; overflow-y:auto; padding:6px 10px 6px 6px; }
  body.tablet .mapsel, body.touch .mapsel { grid-template-columns:repeat(4,150px); }
  .mapcard { position:relative; overflow:hidden; background:#1d2531; border:1px solid #344256; border-radius:10px; padding:13px; cursor:pointer; transition:.15s; }
  .mapcard:hover { border-color:#f5c451; transform:translateY(-3px); }
  .mapcard.lock { opacity:.42; cursor:not-allowed; filter:grayscale(.6); }
  /* 路径缩略图：放在卡片底部 1/3 处当装饰，永远低不透明，悬停/点击也不抢字 */
  .mapcard .thumb { position:absolute; left:0; right:0; bottom:0; height:48%;
    opacity:.22; z-index:0; pointer-events:none;
    -webkit-mask-image:linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
            mask-image:linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0)); }
  .mapcard h4, .mapcard .d, .mapcard .tag { position:relative; z-index:2; }
  .mapcard h4 { font-size:15px; margin-bottom:5px; text-shadow:0 1px 3px #0c0f15; }
  .mapcard .d { color:#cdd6e2; font-size:11px; line-height:1.55; text-shadow:0 1px 3px #0c0f15; }
  .mapcard .tag { display:inline-block; margin-top:8px; font-size:10px; padding:3px 7px; border-radius:10px; }
  .tag.mid{background:#3a352b;color:#f5d08a;} .tag.hard{background:#3a2b2b;color:#ffb0b0;}
  .tag.done{background:#23402b;color:#9fe0a8;} .tag.lk{background:#2a2f3a;color:#8b97a8;}
  .bigbtn { background:#2b6cb0; color:#fff; border:none; border-radius:10px; padding:13px 36px; font-size:17px; cursor:pointer; }
  .bigbtn:hover { background:#3b82d6; }
  #langbtn { position:absolute; top:14px; right:16px; background:rgba(20,26,34,.9);
    border:1px solid #f5c451; color:#f5c451; padding:7px 14px; border-radius:18px;
    font-size:13px; cursor:pointer; z-index:5; }
  #langbtn:hover { background:#3a3320; }
  #credit { position:absolute; bottom:12px; left:0; right:0; text-align:center;
    color:#5b6675; font-size:11px; letter-spacing:.5px; }
  .hint { font-size:11px; color:#6e7a8a; text-align:center; line-height:1.5; margin-top:2px; }
  #msg { position:absolute; top:14px; left:50%; transform:translateX(-50%); background:rgba(20,26,34,.92);
    border:1px solid #344256; color:#f5d08a; padding:8px 18px; border-radius:20px; font-size:13px;
    z-index:15; opacity:0; transition:opacity .3s; pointer-events:none; }
  #pausebtn { position:absolute; top:12px; left:12px; z-index:10; background:rgba(20,26,34,.85);
    border:1px solid #344256; color:#cfe; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; }
  #settingsbtn { position:absolute; top:46px; left:12px; z-index:10; background:rgba(20,26,34,.85);
    border:1px solid #344256; color:#cfe; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; }
  body.touch #pausebtn, body.touch #settingsbtn { padding:9px 15px; font-size:14px; }
  body.touch #settingsbtn { top:54px; }
  /* 设置面板 */
  #ovSettings .panel { background:#1d2531; border:1px solid #344256; border-radius:12px;
    padding:22px 26px; min-width:360px; max-width:90%; }
  #ovSettings h2 { font-size:20px; margin-bottom:10px; color:#f5d08a; letter-spacing:1.5px; }
  #ovSettings .row { display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:10px 4px; border-top:1px solid #2a3340; font-size:14px; }
  #ovSettings .row:first-of-type { border-top:none; }
  #ovSettings .seg { display:flex; gap:6px; }
  #ovSettings .seg button { background:#2a3340; color:#cfe; border:1px solid #344256;
    border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; }
  #ovSettings .seg button.on { background:#3a7d44; border-color:#3a7d44; color:#fff; }
  #ovSettings .actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; justify-content:center; }
  #ovSettings .actions button { padding:10px 18px; font-size:13px; border:none; border-radius:8px; cursor:pointer; color:#fff; }
  #ovSettings .bClose { background:#2b6cb0; }
  #ovSettings .bHome  { background:#8a3a3a; }
  #ovSettings .bAdmin { background:#6a4ab0; }
  /* 建造位弹出菜单（出现在该建造位旁边） */
  #buildMenu { position:absolute; display:none; z-index:14; transform:translate(-50%,-115%);
    background:rgba(18,24,32,.96); border:1px solid #3a4658; border-radius:10px;
    padding:6px; gap:5px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
  #buildMenu.on { display:flex; }
  #buildMenu .bm { width:64px; background:#232d3b; border:1px solid #344256; border-radius:8px;
    padding:6px 3px; text-align:center; cursor:pointer; transition:.1s; }
  #buildMenu .bm:hover { background:#2c3a4d; }
  #buildMenu .bm.dis { opacity:.4; }
  #buildMenu .bm .nm { font-size:11px; color:#e6e9ef; margin-top:1px; }
  #buildMenu .bm .ct { font-size:11px; color:#f5c451; }
  #buildMenu .bm canvas { display:block; margin:0 auto; }
  /* 选中塔后的顶部面板 */
  #topPanel { position:absolute; display:none; z-index:13; left:480px; top:8px;
    transform:translateX(-50%); width:248px; max-width:46vw;
    background:rgba(18,24,32,.95); border:1px solid #3a4658; border-radius:10px;
    padding:8px 10px; font-size:11px; box-shadow:0 6px 20px rgba(0,0,0,.45); }
  #topPanel.on { display:block; }
  #topPanel .stat { color:#9fb0c4; line-height:1.5; margin-top:2px; font-size:10.5px; }
  #topPanel .bar { height:6px; background:#2a2f3a; border-radius:4px; margin-top:5px; overflow:hidden; }
  #topPanel .bar>i { display:block; height:100%; }
  /* 紧凑图标按钮行 */
  #topPanel .acts { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
  #topPanel .acts button { flex:1 1 0; min-width:42px; padding:6px 3px; border-radius:6px;
    border:none; cursor:pointer; color:#fff; line-height:1.05; text-align:center; }
  #topPanel .acts button .ig { font-size:17px; display:block; }
  #topPanel .acts button .ct { font-size:9px; font-style:normal; opacity:.9; display:block; margin-top:1px; }
  body.touch #topPanel .acts button { padding:9px 3px; }
  #topPanel .acts button:disabled, #topPanel .acts button.dim { opacity:.45; }
  .bUp{background:#3a7d44;} .bAmmo{background:#b08018;}
  .bSell{ background:#7a3636; }
  #pClose { position:absolute; right:7px; top:5px; background:none; border:none; color:#8b97a8;
    font-size:16px; cursor:pointer; padding:2px 5px; }
  /* LOGO */
  #logo { display:flex; flex-direction:column; align-items:center; gap:4px; }
  #logo .word { font-size:54px; font-weight:900; letter-spacing:6px;
    background:linear-gradient(180deg,#fff,#f5c451 60%,#c97a2a);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 26px rgba(245,196,81,.35); }
  #logo .sub { font-size:14px; color:#9fb0c4; letter-spacing:4px; }
  /* 图鉴 */
  #ovCodex { justify-content:flex-start; padding-top:26px; }
  #codexBody { width:min(860px,92vw); max-height:64vh; overflow-y:auto; display:grid;
    grid-template-columns:1fr 1fr; gap:10px; padding:4px 8px; }
  .cdx { background:#1d2531; border:1px solid #303b4b; border-radius:9px;
    padding:9px 60px 9px 11px; text-align:left; position:relative; }
  /* 图标放右上角，不挡名字 */
  .cdx canvas { position:absolute; top:8px; right:8px; left:auto; pointer-events:none; opacity:.92; z-index:1; }
  .cdx > div { position:relative; z-index:2; }
  .cdxDet .head canvas { pointer-events:none; }
  .cdx h4 { font-size:14px; margin-bottom:2px; }
  .cdx .role { font-size:11px; color:#f5c451; margin-bottom:4px; }
  .cdx p { font-size:11.5px; color:#9fb0c4; line-height:1.55; max-width:none; }
  .cdx.en h4 { color:#ff8e8e; } .cdx.tw h4 { color:#6cc6ff; }
  .cdx { cursor:pointer; transition:.12s; }
  .cdx:hover { border-color:#f5c451; transform:translateY(-2px); }
  body.touch #codexBody { grid-template-columns:1fr; }
  /* 详情卡 */
  .cdxDet { width:min(820px,94vw); background:#1d2531; border:1px solid #344256; border-radius:12px;
    padding:18px 22px; max-height:72vh; overflow-y:auto; text-align:left; }
  .cdxDet .head { display:flex; gap:14px; align-items:center; margin-bottom:6px; }
  .cdxDet .head canvas { flex:none; }
  .cdxDet .head .nm { font-size:24px; font-weight:bold; }
  .cdxDet.en .nm { color:#ff8e8e; } .cdxDet.tw .nm { color:#6cc6ff; }
  .cdxDet .role { font-size:12px; color:#f5c451; }
  .cdxDet .intro { font-size:14px; color:#cfe; margin:4px 0 12px; font-style:italic; }
  .cdxDet h5 { font-size:12px; color:#93a1b5; letter-spacing:2px; margin:10px 0 4px; }
  .cdxDet p { font-size:13px; line-height:1.7; color:#cfd6df; max-width:none; }
  .cdxDet ul { list-style:none; padding:0; margin:4px 0; }
  .cdxDet ul li { font-size:12.5px; color:#cfd6df; padding:3px 0 3px 16px; position:relative; }
  .cdxDet ul li::before { content:'✦'; position:absolute; left:0; color:#f5c451; }
  .cdxDet table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
  .cdxDet th, .cdxDet td { padding:5px 8px; border-bottom:1px solid #2a3340; text-align:right; }
  .cdxDet th:first-child, .cdxDet td:first-child { text-align:left; color:#93a1b5; }
  .cdxDet thead th { color:#f5c451; }
  .cdxDet .back { margin-top:14px; background:#2a3340; color:#cfe; border:none;
    border-radius:8px; padding:8px 16px; cursor:pointer; font-size:13px; }
  /* 剧情滚动（星战式） */
  #ovStory { background:#000; padding:0; overflow:hidden; }
  #crawlWrap { position:absolute; inset:0; display:flex; justify-content:center;
    perspective:340px; overflow:hidden; }
  #crawl { position:absolute; top:100%; width:min(780px,86vw); color:#f5c451;
    text-align:center; transform:rotateX(26deg); transform-origin:50% 100%;
    font-weight:800; line-height:1.7; text-shadow:0 0 18px rgba(245,196,81,.35);
    animation:crawl 30s linear forwards; }
  #crawl .ttl { font-size:34px; font-weight:900; letter-spacing:3px; margin-bottom:18px; color:#fff; }
  #crawl p { font-size:23px; margin:0 0 16px; }
  @keyframes crawl { 0%{ top:100%; } 100%{ top:-160%; } }
  #storySkip { position:absolute; right:16px; bottom:14px; z-index:3;
    background:rgba(20,26,34,.85); border:1px solid #344256; color:#cfe;
    padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
<div id="rotate"><div class="ic">📱</div><div data-i18h="rotate">请把设备<b>横过来</b><br>Rotate your device to landscape</div></div>
<div id="wrap">
  <div id="stage">
    <canvas id="cv" width="960" height="620"></canvas>
    <button id="pausebtn">⏸ 暂停</button>
    <button id="settingsbtn">⚙ 设置</button>
    <div id="msg"></div>
    <div id="buildMenu"></div>
    <div id="topPanel"></div>

    <div id="side">
      <div class="hud">
        <div class="chip gold"><span data-i18n="hudGold">金币</span> <b id="hGold">0</b></div>
        <div class="chip life"><span data-i18n="hudLife">生命</span> <b id="hLife">0</b></div>
        <div class="chip wave"><span data-i18n="hudWave">波次</span> <b id="hWave">0/0</b></div>
        <div class="chip mine"><span data-i18n="hudMine">矿</span> <b id="hMine">0</b></div>
      </div>
      <div id="towerList" style="display:none"></div>
      <div id="selPanel" style="display:none"></div>
      <button class="act" id="supplyAll" data-i18n="supplyAll">⚙ 全部补给（弹药+武器）</button>
      <button class="act" id="waveBtn">▶ 开始第 1 波</button>
      <p class="hint" data-i18h="sideHint"><b>点路边的建造位</b>选建筑。</p>
    </div>

    <div class="overlay" id="ovMenu">
      <div id="logo">
        <svg viewBox="0 0 120 120" width="96" height="96" aria-hidden="true">
          <circle cx="60" cy="60" r="40" fill="none" stroke="#f5c451" stroke-width="4"/>
          <path d="M60 8 V30 M60 90 V112 M8 60 H30 M90 60 H112" stroke="#f5c451" stroke-width="4" stroke-linecap="round"/>
          <circle cx="60" cy="60" r="6" fill="#ff6b6b"/>
          <path d="M60 38 L66 56 L60 50 L54 56 Z" fill="#6cc6ff"/>
        </svg>
        <div class="word">SPACE&nbsp;HUNTERS</div>
        <div class="sub" data-i18n="menuSub">赏金猎人 · 太空塔防</div>
      </div>
      <p data-i18h="menuDesc"></p>
      <div style="display:flex;gap:14px">
        <button class="bigbtn" id="toMapSel" data-i18n="btnStart">开始战役</button>
        <button class="bigbtn ghost" style="background:#2a3340" id="toCodex" data-i18n="btnCodex">角色图鉴</button>
      </div>
      <p class="hint" data-i18n="menuHint">18 关剧情战役</p>
      <button id="langbtn">EN</button>
      <div id="credit">Designed by Charlie Ma · © 2026</div>
    </div>

    <div class="overlay" id="ovMap" style="display:none">
      <h1 style="font-size:26px"><span data-i18n="mapTitle">选择关卡</span> <small id="mineHdr"></small></h1>
      <div class="mapsel" id="mapCards"></div>
      <div style="display:flex;gap:12px">
        <button class="ghost act" style="width:auto;padding:8px 18px" id="backMenu" data-i18n="btnBack">返回</button>
        <button class="ghost act" style="width:auto;padding:8px 18px" id="resetProg" data-i18n="btnReset">重置进度</button>
      </div>
    </div>

    <div class="overlay" id="ovEnd" style="display:none">
      <h1 id="endTitle"></h1>
      <p id="endText"></p>
      <div style="display:flex;gap:14px">
        <button class="bigbtn" id="nextBtn" style="display:none" data-i18n="endNext">下一关 ▶</button>
        <button class="bigbtn ghost" style="background:#2a3340" id="retryBtn" data-i18n="endRetry">重玩本关</button>
        <button class="bigbtn ghost" style="background:#2a3340" id="mapBtn" data-i18n="endMaps">关卡列表</button>
      </div>
    </div>

    <div class="overlay" id="ovCodex" style="display:none">
      <h1 style="font-size:24px"><span data-i18n="codexTitle">百科全书</span> <small style="font-size:12px;color:#8b97a8">SPACE HUNTERS ENCYCLOPEDIA</small></h1>
      <div id="codexBody"></div>
      <button class="ghost act" style="width:auto;padding:8px 20px" id="codexBack" data-i18n="btnBack">返回</button>
    </div>

    <div class="overlay" id="ovStory" style="display:none">
      <div id="crawlWrap"><div id="crawl"></div></div>
      <button id="storySkip" data-i18n="storySkip">跳过 ▶</button>
    </div>

    <div class="overlay" id="ovSettings" style="display:none">
      <div class="panel">
        <h2 data-i18n="setTitle">⚙ 设置</h2>
        <div class="row"><span data-i18n="setSpeed">速度</span>
          <div class="seg" id="setSpeed">
            <button data-s="1">1x</button><button data-s="2">2x</button><button data-s="3">3x</button>
          </div>
        </div>
        <div class="row"><span data-i18n="setMusic">音乐</span> <div class="seg" id="setMusic">
          <button data-v="on" data-i18n="segOn">开</button><button data-v="off" data-i18n="segOff">关</button></div></div>
        <div class="row"><span data-i18n="setSfx">音效</span> <div class="seg" id="setSfx">
          <button data-v="on" data-i18n="segOn">开</button><button data-v="off" data-i18n="segOff">关</button></div></div>
        <div class="actions">
          <button class="bClose" id="sClose" data-i18n="setClose">▶ 关闭并继续</button>
          <button class="bHome"  id="sHome" data-i18n="setHome">≡ 回到主菜单</button>
          <button class="bAdmin" id="sAdmin">🔓 管理员：解锁全部关卡</button>
        </div>
        <p class="hint" style="margin-top:10px" data-i18n="setHint">打开设置时游戏自动暂停，关闭后自动继续。</p>
      </div>

      W.push({ groups, hpMul:mul });
    }
    return W;

// 渐进解锁敌种：每通一关多 1 种，封顶为基础 5 + 3 个变种
function enemyPool(){
  const c=clearedCount();
  const base=['grunt','runner','armor','flyer'];          // 4 基础
  const extras=['biter','speeder','tanker'];              // 3 解锁
  const k=Math.min(extras.length, Math.max(0, c-1));      // 通关 2 关后开始解锁
  return base.concat(extras.slice(0,k));
}
// 第 6/12/18 关的特殊 Boss
function bossFor(mi){
  if(mi===5)  return 'bossEarth';
  if(mi===11) return 'bossSpace';
  if(mi===17) return 'bossHell';
  return 'boss';
}
function wavesFor(mi){
  const k=1+mi*0.11, W=[];
  const pool=enemyPool();
  const has=t=>pool.indexOf(t)>=0;
  for(let i=1;i<=12;i++){
    if(i===12){ const bt=bossFor(mi);
      W.push({ groups:[
        {t:'grunt',n:14,gap:0.4},
        {t:'armor',n:9,gap:0.65},
        {t:'flyer',n:8,gap:0.45},
        ...(has('biter')?[{t:'biter',n:6,gap:0.35}]:[]),
        ...(has('speeder')?[{t:'speeder',n:5,gap:0.4}]:[]),
        ...(has('tanker')?[{t:'tanker',n:3,gap:0.7}]:[]),
        {t:bt,n:1,gap:0}
      ], hpMul:1.15*k }); break; }
    const g=[{t:'grunt',n:7+i*3,gap:Math.max(0.35,0.95-i*0.05)}];
    if(i>=2) g.push({t:'runner',n:3+Math.ceil(i*1.5),gap:0.4});
    if(i>=4) g.push({t:'armor', n:Math.ceil(i/1.5),gap:0.8});
    if(i>=4) g.push({t:'flyer', n:2+Math.floor(i/1.5),gap:0.5});
    // 解锁的变种从中后期掺入
    if(i>=5 && has('biter'))   g.push({t:'biter',  n:Math.ceil(i*0.7), gap:0.35});
    if(i>=6 && has('speeder')) g.push({t:'speeder',n:Math.ceil(i*0.5), gap:0.5});
    if(i>=7 && has('tanker'))  g.push({t:'tanker', n:Math.ceil(i*0.3), gap:0.8});
    W.push({ groups:g, hpMul:(1+i*0.10)*k });
  }
  return W;
}
MAPS.forEach((m,i)=>m.waves=wavesFor(i));

/* ---------- 路径与建造位 ---------- */
function pathLen(p){ let L=0; for(let i=1;i<p.length;i++) L+=dist(p[i-1][0],p[i-1][1],p[i][0],p[i][1]); return L; }
function _lp(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t]; }
// 向心 Catmull-Rom：把路点细分成平滑折线（端点精确保留 → 分叉起终点不偏移）
function smoothPath(pts){
  if(!SMOOTH || !pts || pts.length<3) return pts;
  const P=pts.map(p=>[p[0],p[1]]);
  const A=[2*P[0][0]-P[1][0], 2*P[0][1]-P[1][1]];
  const Z=[2*P[P.length-1][0]-P[P.length-2][0], 2*P[P.length-1][1]-P[P.length-2][1]];
  const Q=[A,...P,Z], out=[[P[0][0],P[0][1]]], STEP=14;
  const kn=(ti,a,b)=>ti+Math.pow(Math.hypot(b[0]-a[0],b[1]-a[1])||1e-4,0.5);
  for(let i=1;i<Q.length-2;i++){
    const p0=Q[i-1],p1=Q[i],p2=Q[i+1],p3=Q[i+2];
    const t0=0,t1=kn(t0,p0,p1),t2=kn(t1,p1,p2),t3=kn(t2,p2,p3);
    for(let s=1;s<=STEP;s++){
      const t=t1+(t2-t1)*(s/STEP);
      const a1=_lp(p0,p1,(t-t0)/(t1-t0)), a2=_lp(p1,p2,(t-t1)/(t2-t1)), a3=_lp(p2,p3,(t-t2)/(t3-t2));
      const b1=_lp(a1,a2,(t-t0)/(t2-t0)), b2=_lp(a2,a3,(t-t1)/(t3-t1));
      out.push(_lp(b1,b2,(t-t1)/(t2-t1)));
    }
  }
  out[out.length-1]=[P[P.length-1][0],P[P.length-1][1]];
  return out;
}
function pointAt(p,d){
  for(let i=1;i<p.length;i++){ const s=dist(p[i-1][0],p[i-1][1],p[i][0],p[i][1]);
    if(d<=s){ const t=s?d/s:0; return {x:lerp(p[i-1][0],p[i][0],t), y:lerp(p[i-1][1],p[i][1],t), done:false}; }
    d-=s; }
  const e=p[p.length-1]; return {x:e[0],y:e[1],done:true};
}
function segDist(px,py,a,b){
  const dx=b[0]-a[0],dy=b[1]-a[1],l2=dx*dx+dy*dy;
  let t=l2?((px-a[0])*dx+(py-a[1])*dy)/l2:0; t=Math.max(0,Math.min(1,t));
  return dist(px,py,a[0]+t*dx,a[1]+t*dy);
}
function minPathDist(px,py,p){ let m=1e9; for(let i=1;i<p.length;i++) m=Math.min(m,segDist(px,py,p[i-1],p[i])); return m; }
function minRoutesDist(px,py,routes){ let m=1e9; for(const p of routes){ const v=minPathDist(px,py,p); if(v<m)m=v; } return m; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
// 建造位数量控制：
//   目标数 = clamp( 路网总长 / SPACING , MIN , MAX )
//   SPACING≈每多少像素路给 1 个塔位（越大→塔位越少）；按各路线长度比例分配；
//   位置非均匀（有簇有疏），分叉关也不会爆量（封顶 MAX）。
const PAD_SPACING=240, PAD_MIN=8, PAD_MAX=15;
function genPads(routes, seed){
  const rnd=mulberry32(((seed|0)+1)*99991), pads=[];
  const lens=routes.map(pathLen), total=lens.reduce((a,b)=>a+b,0);
  const target=Math.max(PAD_MIN, Math.min(PAD_MAX, Math.round(total/PAD_SPACING)));
  for(let ri=0;ri<routes.length;ri++){
    const path=routes[ri], plen=lens[ri];
    const want=Math.max(2, Math.round(target*plen/total));
    const avg=plen/(want+1);
    let placed=0, tries=0, d=avg*(0.45+rnd()*0.4);
    while(placed<want && tries<want*10 && d<plen-28){
      tries++;
      const a=pointAt(path,d), b=pointAt(path,Math.min(d+5,plen));
      let nx=-(b.y-a.y), ny=(b.x-a.x); const L=Math.hypot(nx,ny)||1; nx/=L; ny/=L;
      const off=52 + (rnd()*16-2);
      let put=false;
      for(const s of (rnd()<0.5?[1,-1]:[-1,1])){
        const px=a.x+nx*off*s, py=a.y+ny*off*s;
        if(px<24||px>936||py<24||py>596) continue;
        if(minRoutesDist(px,py,routes)<46) continue;            // 远离任何一条路
        if(pads.some(q=>dist(q.x,q.y,px,py)<54)) continue;       // 塔位之间留间距
        pads.push({x:px,y:py,tower:null}); placed++; put=true; break;
      }
      // 非均匀步进：约 30% 形成密集簇，其余拉开大间隔
      d += put ? (rnd()<0.30 ? avg*(0.4+rnd()*0.3) : avg*(0.95+rnd()*0.7))
               : avg*0.5;
    }
  }
  return pads;
}

// 主题：'earth'（蓝绿地球带）/ 'space'（深空）/ 'hell'（熔岩）
const THEMES={
  earth:{ grad:['#08251f','#0d3f3a','#072018'], starColor:'rgba(220,255,235,', starDensity:80,
    palettes:[['#3a8a4e','#1a3b22'],['#3a6bcc','#1b2a55'],['#88cc55','#2d3a17'],['#7ad3ff','#23495a']] },
  space:{ grad:['#080a16','#0c1226','#080812'], starColor:'rgba(255,255,255,', starDensity:155,
    palettes:[['#6c7cff','#262d66'],['#ff9466','#7a3a26'],['#46d6c2','#1d564f'],['#c95bff','#56276f'],['#ffd45b','#7a5f1f']] },
  hell: { grad:['#1a0408','#2e0a0f','#100204'], starColor:'rgba(255,150,90,', starDensity:60,
    palettes:[['#ff4422','#5a1208'],['#ffaa33','#5a2a0a'],['#cc2233','#3a0808'],['#ff7733','#4a1a08']] },
};
function themeFor(mi){
  if(mi<6) return 'earth'; if(mi<12) return 'space'; if(mi<18) return 'hell';
  // 奖励关：每个 3 关系列轮换
  return ['earth','space','hell'][Math.floor((mi-18)/3)%3];
}
function genSpace(routes, theme){
  const T = THEMES[theme]||THEMES.space;
  const stars=[];
  for(let i=0;i<T.starDensity;i++) stars.push({ x:Math.random()*GW, y:Math.random()*GH,
    r:Math.random()*1.5+0.3, ph:Math.random()*6.28, sp:0.5+Math.random()*1.6 });
  const pals=T.palettes;
  const planets=[]; let tries=0;
  while(planets.length<4 && tries<400){ tries++;
    const r=24+Math.random()*36, x=70+Math.random()*800, y=60+Math.random()*500;
    if(minRoutesDist(x,y,routes)<r+48) continue;
    if(planets.some(p=>dist(p.x,p.y,x,y)<p.r+r+46)) continue;
    const c=pals[(Math.random()*pals.length)|0];
    planets.push({ x,y,r, c0:c[0], c1:c[1], ring:Math.random()<0.42, rot:Math.random()*6.28,
      hellGlow: theme==='hell' });
  }
  return { stars, planets, theme };
}

/* ---------- 图标绘制（塔 / 敌人 logo） ---------- */
function towerArt(g,key,tier,R,col,empty){
  const c=empty?'#5a5f66':col;
  g.lineWidth=2; g.strokeStyle='#10151c'; g.fillStyle=c;
  if(key==='arrow'){
    if(tier>=3){ // 狙击塔
      g.beginPath(); g.arc(0,0,R*0.62,0,7); g.stroke();
      g.beginPath(); g.moveTo(-R*0.9,0); g.lineTo(R*0.9,0); g.moveTo(0,-R*0.9); g.lineTo(0,R*0.9); g.stroke();
      g.fillStyle=c; g.beginPath(); g.arc(0,0,3,0,7); g.fill();
    } else { // 弓
      g.beginPath(); g.arc(2,0,R*0.7,-1.1,1.1); g.stroke();
      g.beginPath(); g.moveTo(2+Math.cos(-1.1)*R*0.7,Math.sin(-1.1)*R*0.7); g.lineTo(2+Math.cos(1.1)*R*0.7,Math.sin(1.1)*R*0.7); g.stroke();
      g.beginPath(); g.moveTo(-R*0.7,0); g.lineTo(R*0.7,0); g.lineWidth=2.5; g.stroke();
      g.fillStyle=c; g.beginPath(); g.moveTo(R*0.7,0); g.lineTo(R*0.4,-4); g.lineTo(R*0.4,4); g.fill();
    }
  } else if(key==='mage'){
    g.beginPath(); g.arc(0,2,R*0.55,0,7); g.fill(); g.stroke();
    g.fillStyle='#fff';
    const spk= tier>=3?6:5;
    g.beginPath();
    for(let i=0;i<spk*2;i++){ const ang=i*Math.PI/spk-Math.PI/2, rr=i%2? R*0.28:R*0.62;
      g[i?'lineTo':'moveTo'](Math.cos(ang)*rr, 2+Math.sin(ang)*rr*0.5); }
    g.closePath(); g.globalAlpha=tier>=3?.9:.65; g.fill(); g.globalAlpha=1;
  } else if(key==='cannon'){
    g.beginPath(); g.arc(0,3,R*0.6,0,7); g.fill(); g.stroke();
    g.save(); g.rotate(-0.5); g.fillStyle=c; g.fillRect(0,-4,R*1.0,8); g.strokeRect(0,-4,R*1.0,8); g.restore();
    if(tier>=3){ g.fillStyle='#ff9b3d';
      for(let i=0;i<3;i++){ g.beginPath(); g.arc(R*0.6+i*4,-R*0.5+i*3,3,0,7); g.fill(); } }
  } else { // barracks
    g.fillStyle=c;
    g.beginPath(); g.moveTo(-R*0.75,R*0.55); g.lineTo(0,-R*0.7); g.lineTo(R*0.75,R*0.55); g.closePath(); g.fill(); g.stroke();
    g.strokeStyle='#10151c'; g.beginPath(); g.moveTo(0,-R*0.7); g.lineTo(0,R*0.55); g.stroke();
    g.fillStyle='#e6e9ef'; for(let i=0;i<tier;i++){ g.beginPath(); g.arc(-R*0.4+i*R*0.4, R*0.78, 2.4,0,7); g.fill(); }
  }
}
function enemyArt(g,e){
  const R=e.r, T=e.type, att=!!e.blocker;
  const T0=performance.now()/1000;
  const swing = att ? Math.sin(T0*9) : 0;     // 攻击摆动 [-1..1]
  g.lineWidth=1.5; g.strokeStyle='rgba(0,0,0,.6)';
  if(T==='grunt' || T==='biter'){
    // 黄色球球，全身布满眼睛，底部一张嘴；攻击时嘴张开咬合
    g.fillStyle=e.def.color; g.beginPath(); g.arc(0,0,R,0,7); g.fill(); g.stroke();
    // 散布在球面上的眼睛（确定性位置：基于半径的固定环+格子）
    const positions=[ [0,-R*0.6],[R*0.55,-R*0.25],[-R*0.55,-R*0.25],
      [R*0.35,R*0.15],[-R*0.35,R*0.15],[R*0.65,R*0.1],[-R*0.65,R*0.1],
      [0,-R*0.15],[R*0.25,-R*0.55],[-R*0.25,-R*0.55]];
    for(const p of positions){
      g.fillStyle='#fff'; g.beginPath(); g.arc(p[0],p[1],R*0.16,0,7); g.fill();
      g.fillStyle='#0a0a0a'; g.beginPath(); g.arc(p[0]+R*0.04,p[1]+R*0.03,R*0.075,0,7); g.fill();
    }
    // 嘴：底部，闭合或张开
    const mouthOpen = att ? (0.5 + 0.5*Math.abs(swing)) : 0.18;
    g.fillStyle='#3a0d0d'; g.beginPath();
    g.ellipse(0, R*0.55, R*0.42, R*0.18*mouthOpen, 0, 0, 7); g.fill();
    if(mouthOpen>0.3){ // 牙齿
      g.fillStyle='#fff';
      for(let i=-2;i<=2;i++){ g.beginPath();
        g.moveTo(i*R*0.12, R*0.55-R*0.18*mouthOpen);
        g.lineTo(i*R*0.12-R*0.04, R*0.55-R*0.07);
        g.lineTo(i*R*0.12+R*0.04, R*0.55-R*0.07); g.closePath(); g.fill(); }
    }
  }
  else if(T==='runner' || T==='speeder'){
    // 蛇身：S 形脊柱多节身体；攻击时尾巴大幅甩动
    const tailA = att ? swing*0.8 : Math.sin(T0*3 + (e.lph||0))*0.25;
    g.fillStyle=e.def.color;
    // 身体段：5 节，从头到尾，越来越小
    const segs=[ {x:R*0.5, y:0, r:R*0.55},
                 {x:R*0.05, y:Math.sin(T0*5)*R*0.1, r:R*0.5},
                 {x:-R*0.4, y:Math.sin(T0*5+0.5)*R*0.15, r:R*0.45},
                 {x:-R*0.85+tailA*R*0.2, y:tailA*R*0.55, r:R*0.38},
                 {x:-R*1.3+tailA*R*0.4, y:tailA*R*1.0, r:R*0.28} ];
    g.strokeStyle='rgba(0,0,0,.55)';
    for(let i=segs.length-1;i>=0;i--){ const s=segs[i];
      g.beginPath(); g.arc(s.x,s.y,s.r,0,7); g.fill(); g.stroke(); }
    // 头部眼睛 + 信子
    g.fillStyle='#fff'; g.beginPath(); g.arc(R*0.65,-R*0.18,R*0.13,0,7); g.fill();
    g.fillStyle='#0a0a0a'; g.beginPath(); g.arc(R*0.7,-R*0.16,R*0.06,0,7); g.fill();
    g.strokeStyle='#c43030'; g.lineWidth=1.6;
    g.beginPath(); g.moveTo(R*0.95,R*0.05); g.lineTo(R*1.25,R*0.0);
    g.moveTo(R*1.25,R*0.0); g.lineTo(R*1.4,-R*0.1);

    // 铁盾（左手），举高/放下

    g.lineTo(R*0.55, 0); g.lineTo(-R*0.55, 0); g.closePath();
    g.fill(); g.stroke();
    // 腿（两条）
    g.beginPath(); g.rect(-R*0.45, R*0.95, R*0.35, R*0.4); g.rect(R*0.10, R*0.95, R*0.35, R*0.4); g.fill(); g.stroke();
    // 头
    g.fillStyle=e.def.color;
    g.beginPath(); g.arc(0,-R*0.35,R*0.55,0,7); g.fill(); g.stroke();
    // 头顶上生出的脚（怪异！）—— 两只小脚朝上
    g.save(); g.translate(-R*0.22,-R*0.85);
    g.beginPath(); g.rect(-R*0.08,0,R*0.16,R*0.3); g.fill(); g.stroke();
    g.beginPath(); g.ellipse(0,0,R*0.18,R*0.08,0,0,7); g.fill(); g.stroke();      // 脚掌
    g.restore();
    g.save(); g.translate(R*0.22,-R*0.85);
    g.beginPath(); g.rect(-R*0.08,0,R*0.16,R*0.3); g.fill(); g.stroke();
    g.beginPath(); g.ellipse(0,0,R*0.18,R*0.08,0,0,7); g.fill(); g.stroke();
    g.restore();
    // 独眼
    g.fillStyle='#fff'; g.beginPath(); g.arc(0,-R*0.32,R*0.22,0,7); g.fill();
    g.strokeStyle='#000'; g.lineWidth=2; g.stroke();
    g.fillStyle=isSpecial?'#d22':'#1a1a1a';
    g.beginPath(); g.arc(0,-R*0.30,R*0.11,0,7); g.fill();
    g.fillStyle='#fff'; g.beginPath(); g.arc(-R*0.04,-R*0.34,R*0.04,0,7); g.fill();
    // 嘴（咧）
    g.strokeStyle='#000'; g.lineWidth=2; g.beginPath();
    g.arc(0,-R*0.05,R*0.18,0.2,Math.PI-0.2); g.stroke();
    // 右手巨型粗棒
    g.save();
    g.translate(R*0.55, R*0.2);
    g.rotate(-0.6 - clubA);     // 平时拖在后，攻击时往前挥
    g.fillStyle=isSpecial? (T==='bossEarth'?'#5a3e21':T==='bossSpace'?'#3a3a8a':'#7a2418') : '#5a3e21';
    g.strokeStyle='#1a1a1a'; g.lineWidth=2;
    // 杆 + 棒头（圆头）
    g.beginPath(); g.roundRect ? g.roundRect(0,-R*0.07,R*1.1,R*0.14,4) : g.rect(0,-R*0.07,R*1.1,R*0.14);
    g.fill(); g.stroke();
    g.beginPath(); g.arc(R*1.1,0,R*0.32,0,7); g.fill(); g.stroke();
    // 棒头表面装饰
    if(T==='bossHell'){ g.fillStyle='#ffaa33';
      for(let i=0;i<4;i++){ g.beginPath(); g.arc(R*1.1+Math.cos(i*1.5)*R*0.15, Math.sin(i*1.5)*R*0.15, R*0.04, 0, 7); g.fill(); } }
    else if(T==='bossSpace'){ g.fillStyle='#aac6ff';
      for(let i=0;i<6;i++){ g.beginPath(); g.arc(R*1.1+Math.cos(i)*R*0.15, Math.sin(i)*R*0.15, R*0.03, 0, 7); g.fill(); } }
    else if(T==='bossEarth'){ g.strokeStyle='#3a2614'; g.lineWidth=1.5;
      g.beginPath(); g.moveTo(R*0.95,-R*0.2); g.lineTo(R*1.25,R*0.2); g.stroke(); }
    else { g.fillStyle='#3a2410';
      for(let i=0;i<3;i++){ g.beginPath(); g.arc(R*1.1+Math.cos(i*2)*R*0.15, Math.sin(i*2)*R*0.15, R*0.05, 0, 7); g.fill(); } }
    g.restore();
    // 特殊 Boss 特效光环
    if(isSpecial){
      const ringC = T==='bossEarth'?'#7aff8a':T==='bossSpace'?'#aacaff':'#ffaa55';
      g.strokeStyle=ringC; g.globalAlpha=0.4+0.3*Math.sin(T0*4); g.lineWidth=2;
      g.beginPath(); g.arc(0,R*0.2,R*1.2,0,7); g.stroke(); g.globalAlpha=1;
    }
  }
}

/* ---------- 实体 ---------- */
let G=null, speed=1, selectedBuild=null, selectedTower=null, mouse={x:-99,y:-99};
let paused=false, rallySetFor=null;

class Enemy{
  constructor(type,hpMul){ const d=ENEMIES[type]; this.type=type; this.def=d; this.hpMul=hpMul;
    this.maxhp=Math.round(d.hp*hpMul); this.hp=this.maxhp;
    this.speed=d.speed*(0.9+Math.random()*0.2);         // 每只速度略有差异
    this.armor=d.armor; this.mres=d.mres||0;
    this.r=d.r; this.air=d.air; this.dist=0; this.slowT=0; this.slowF=1; this.dead=false; this.leaked=false;
    this.blocker=null; this.burnT=0; this.burnDmg=0;
    // 走位随机：不都贴中线（Boss 体型大走中间）
    // 选路线：Boss 走主线；其余在多线间轮流分流
    if(G){ if(type==='boss') this.route=G.routes[0];
      else { G._ri=((G._ri|0)+1); this.route=G.routes[G._ri%G.routes.length]; } }
    this.lane0 = type==='boss' ? 0 : (Math.random()*2-1)*16;
    this.lph = Math.random()*6.28; this.lw = 0.5+Math.random();
    if(type==='boss'){ this.sumT=6; this.blinkT=5; }     // 召唤 / 短距穿越计时
  }
  update(dt){
    if(this.slowT>0){ this.slowT-=dt; if(this.slowT<=0)this.slowF=1; }
    if(this.burnT>0){ this.burnT-=dt; this.hp-=this.burnDmg*dt; if(this.hp<=0){this.dead=true;return;} }
    // Boss：定时召唤帮手 + 概率短距离穿越
    if(this.type==='boss'){
      // 召唤与穿越：即使正被士兵拦住也能发动
      this.sumT-=dt;
      if(this.sumT<=0){ this.sumT=7;
        const kinds=['grunt','runner','grunt'];
        for(let i=0;i<3;i++){ const e=new Enemy(kinds[i], this.hpMul||1);
          e.route=this.route; e.dist=Math.max(0,this.dist-18-i*10); G.pendingEnemies.push(e); }
        flash(LANG==='en'?'⚠ The Overlord summons help!':'⚠ 魔王召唤了帮手！');
      }
      this.blinkT-=dt;
      if(this.blinkT<=0){ this.blinkT=5;
        if(Math.random()<0.6){
          this.dist+=80;
          if(this.blocker){                          // 穿越挣脱士兵拦截
            if(this.blocker.target===this) this.blocker.target=null;
            this.blocker=null;
          }
          flash(LANG==='en'?'⚠ The Overlord blinks free of the block!':'⚠ 魔王穿越！挣脱了拦截');
        } }
    }
    if(this.blocker && !this.blocker.dead) return;        // 被士兵拦住，不前进
    if(this.blocker && this.blocker.dead) this.blocker=null;
    this.dist+=this.speed*this.slowF*dt;
    const RT=this.route||G.path;
    const p=pointAt(RT,this.dist), p2=pointAt(RT,this.dist+6);
    let vx=p2.x-p.x, vy=p2.y-p.y; const L=Math.hypot(vx,vy)||1;
    const nx=-vy/L, ny=vx/L;
    const lane=this.lane0 + Math.sin(performance.now()/1000*this.lw+this.lph)*4;
    this.x=p.x+nx*lane; this.y=p.y+ny*lane;
    if(p.done) this.leaked=true;
  }
  hit(dmg,type){
    // 重甲兵在攻击士兵时盾会放下，护甲失效
    let arm=this.armor;
    if((this.type==='armor'||this.type==='tanker') && this.blocker) arm = 0;
    const d = type==='magic' ? Math.max(1,dmg-this.mres) : Math.max(1,dmg-arm);
    this.hp-=d; if(this.hp<=0&&!this.dead) this.dead=true; }
}
class Soldier{
  constructor(b){ this.b=b; this.maxhp=b.S.sHp; this.hp=this.maxhp; this.dmg=b.S.sDmg;
    this.x=b.x; this.y=b.y; this.dead=false; this.target=null; }
  reset(){ this.hp=this.maxhp; this.dead=false; this.x=this.b.x; this.y=this.b.y; this.target=null; }
}
class Tower{
  constructor(key,pad){ this.key=key; this.def=TOWERS[key]; this.pad=pad; this.x=pad.x; this.y=pad.y;
    this.tier=1; this.cool=0; this.ang=0; this.perks={}; pad.tower=this; this._apply();
    if(this.kind==='ammo') this.ammo=this.S.ammoMax;
    if(this.kind==='weapon'){ this.wp=this.S.wpMax; this.soldiers=[]; this.respawn=[];
      this.rally=this._rally(); for(let i=0;i<this.S.count;i++) this.soldiers.push(new Soldier(this)); sfx('deploy'); } }
  get kind(){ return this.def.kind; }
  _apply(){ this.S=this.def.tiers[this.tier-1]; }
  hasPerk(k){ return !!this.perks[k]; }
  _rally(){ // 离塔最近的「任意路线」上的点
    let bd=1e9,bx=this.x,by=this.y;
    for(const rt of (G.routes||[G.path])){ const tot=pathLen(rt);
      for(let d=0;d<tot;d+=14){ const p=pointAt(rt,d); const dd=dist(p.x,p.y,this.x,this.y);
        if(dd<bd){bd=dd;bx=p.x;by=p.y;} } }
    return {x:bx,y:by}; }
  // 每次升级单独收费，逐级递增（不是累计总价）：
  //   升到 2 级花费 = 造价×0.8；升到 3 级花费 = 升2级花费 ×1.5
  upCost(){ const up2=Math.round(this.def.cost*0.8);
            return this.tier===1 ? up2 : Math.round(up2*1.5); }
  sellVal(){ return Math.round(this.def.cost*0.5 + this.def.cost*0.45*(this.tier-1)); }
  upgrade(){ if(this.tier>=3) return; this.tier++; this._apply();
    if(this.kind==='ammo') this.ammo=Math.min(this.ammo,this.S.ammoMax);
    if(this.kind==='weapon'){ this.wp=this.S.wpMax;
      while(this.soldiers.length+this.respawn.length<this.S.count) this.soldiers.push(new Soldier(this));
      this.soldiers.forEach(s=>{ s.maxhp=this.S.sHp; s.dmg=this.S.sDmg; }); } }
  update(dt){
    if(this.kind==='weapon'){ this._barracks(dt); return; }
    if(this.cool>0) this.cool-=dt;
    if(this.ammo<=0) return;
    let tgt=null,best=-1;
    for(const e of G.enemies){ if(e.dead||e.leaked) continue;
      if(e.air&&!this.S.air) continue;
      if(dist(this.x,this.y,e.x,e.y)<=this.S.range && e.dist>best){ best=e.dist; tgt=e; } }
    if(tgt){ this.ang=Math.atan2(tgt.y-this.y,tgt.x-this.x);
      if(this.cool<=0){ this.cool=this.S.rate; this.ammo--; G.shots.push(new Shot(this,tgt));
        if(this.key==='arrow') sfx('arrow'); else if(this.key==='mage') sfx('magic'); } }
  }
  _barracks(dt){
    const S=this.S;
    // 重生
    for(let i=this.respawn.length-1;i>=0;i--){ this.respawn[i].t-=dt;
      if(this.respawn[i].t<=0){ const s=this.respawn[i].s; s.reset(); this.soldiers.push(s); this.respawn.splice(i,1); sfx('deploy'); } }
    let fighting=0;
    const regen=this.hasPerk('regen'), thorns=this.hasPerk('thorns');
    for(const s of this.soldiers){
      if(s.dead) continue;
      if(regen && s.hp<s.maxhp) s.hp=Math.min(s.maxhp, s.hp + s.maxhp*0.07*dt);
      // 选目标
      if(!s.target || s.target.dead || s.target.leaked || (s.target.blocker&&s.target.blocker!==s)){
        if(s.target&&s.target.blocker===s) s.target.blocker=null; s.target=null;
        let bd=1e9,t=null;
        for(const e of G.enemies){ if(e.dead||e.leaked||e.air||e.blocker) continue;
          if(dist(this.x,this.y,e.x,e.y)<=S.range){ const dd=dist(this.rally.x,this.rally.y,e.x,e.y);
            if(dd<bd){bd=dd;t=e;} } }
        if(t){ s.target=t; t.blocker=s; }
      }
      const goalX = s.target? s.target.x : this.rally.x;
      const goalY = s.target? s.target.y : this.rally.y;
      const dd=dist(s.x,s.y,goalX,goalY);
      if(dd>14){ const f=Math.min(1,(95*dt)/dd); s.x=lerp(s.x,goalX,f); s.y=lerp(s.y,goalY,f); }
      else if(s.target){
        fighting++;
        const broken=this.wp<=0;
        s.target.hp -= (broken? s.dmg*0.15 : s.dmg) * dt;
        if(s.target.hp<=0){ s.target.dead=true; s.target.blocker=null; s.target=null; }
        else { const inc=Math.max(1, s.target.def.mdmg-(S.armor||0));
          s.hp -= inc*dt;                                   // 骑士堡护甲减伤
          if(thorns){ s.target.hp -= inc*0.6*dt;            // 荆棘反伤
            if(s.target.hp<=0){ s.target.dead=true; s.target.blocker=null; s.target=null; } }
          if(s.target && s.hp<=0){ s.dead=true; s.target.blocker=null; s.target=null;
            this.respawn.push({s, t:6}); }
          else if(s.hp<=0){ s.dead=true; this.respawn.push({s, t:6}); } }
      }
    }
    this.soldiers=this.soldiers.filter(s=>!s.dead);
    if(fighting>0 && this.wp>0) this.wp=Math.max(0,this.wp - fighting*0.7*dt);
  }
}
class Shot{
  constructor(t,tgt){ this.x=t.x; this.y=t.y; this.tgt=tgt; this.S=t.S; this.tw=t; this.dmg=t.S.dmg;
    this.spd=460; this.dead=false; this.col=t.def.color;
    if(t.hasPerk('crit') && Math.random()<0.25){ this.dmg*=2; this.crit=true; } }
  update(dt){
    if(this.tgt.dead||this.tgt.leaked){ this.dead=true; return; }
    const d=dist(this.x,this.y,this.tgt.x,this.tgt.y);
    if(d<10){ this._impact(); this.dead=true; return; }
    const f=Math.min(1,(this.spd*dt)/d); this.x=lerp(this.x,this.tgt.x,f); this.y=lerp(this.y,this.tgt.y,f);
  }
  _impact(){ const S=this.S, P=this.tw;
    let splash=S.splash;
    if(splash>0 && P.hasPerk('bigblast')) splash=Math.round(splash*1.45);
    if(splash>0){ for(const e of G.enemies){ if(e.dead||e.leaked) continue;
        if(dist(this.tgt.x,this.tgt.y,e.x,e.y)<=splash){ e.hit(this.dmg,S.type);
          if(S.burn && !e.dead){ e.burnT=S.burnT; e.burnDmg=S.burn; } } }
      G.blasts.push({x:this.tgt.x,y:this.tgt.y,r:splash,life:.25,max:.25}); sfx('boom');
      if(P.hasPerk('napalm')) G.zones.push({x:this.tgt.x,y:this.tgt.y,r:splash*0.9,life:4,max:4,dps:(S.burn||10)}); }
    else {
      let dmg=this.dmg;
      if(P.hasPerk('shatter') && this.tgt.slowF<1) dmg=Math.round(dmg*1.4);
      this.tgt.hit(dmg,S.type);
      if(S.slow&&!this.tgt.dead){ this.tgt.slowF=S.slow; this.tgt.slowT=1.4; }
      if(P.hasPerk('pierce')){ let n=null,bd=1e9;
        for(const e of G.enemies){ if(e===this.tgt||e.dead||e.leaked) continue;
          if(e.air&&!S.air) continue;
          const dd=dist(this.tgt.x,this.tgt.y,e.x,e.y); if(dd<=70&&dd<bd){bd=dd;n=e;} }
        if(n) n.hit(Math.round(this.dmg*0.6),S.type); }
      if(P.hasPerk('chain')){ let n=null,bd=1e9;
        for(const e of G.enemies){ if(e===this.tgt||e.dead||e.leaked) continue;
          const dd=dist(this.tgt.x,this.tgt.y,e.x,e.y); if(dd<=120&&dd<bd){bd=dd;n=e;} }
        if(n){ n.hit(Math.round(this.dmg*0.5),'magic'); if(S.slow){ n.slowF=S.slow; n.slowT=1.2; } } }
    }
  }
}

/* ---------- 关卡控制 ---------- */
function startGame(mi){
  const M=MAPS[mi];
  const sp=genSpace(M.routes, themeFor(mi));
  G={ mi, M, routes:M.routes, path:M.routes[0], pads:genPads(M.routes, mi), gold:200, lives:20, livesMax:20,
      clock:0, nextWaveAt:Infinity, spawnList:[],
      mines:mineCount(), waveIdx:0, totalWaves:M.waves.length, _ri:0,
      enemies:[], pendingEnemies:[], towers:[], shots:[], blasts:[], zones:[], phase:'prep', spawnQ:[], spawnT:0,
      running:true, started:false, autoIn:0, stars:sp.stars, planets:sp.planets, theme:sp.theme };
  startMusic();
  selectedBuild=null; selectedTower=null; speed=1; paused=false; rallySetFor=null;
  if($('pausebtn')) $('pausebtn').textContent=t('pause');
  hideOverlays(); closeBuildMenu(); buildTowerList(); refreshHUD(); updateWaveBtn(); renderSel();
}
// 把一波的敌人按相对节奏排入「绝对时间表」spawnList
function scheduleWave(waveIdx){
  const w=G.M.waves[waveIdx]; if(!w) return;
  let t=G.clock;
  for(const grp of w.groups){
    for(let i=0;i<grp.n;i++){
      G.spawnList.push({type:grp.t, spawnAt:t + i*grp.gap, hpMul:w.hpMul, waveIdx});
    }
    t += grp.n * grp.gap;
  }
  G.spawnList.sort((a,b)=>a.spawnAt-b.spawnAt);
}
function launchWave(early){
  if(G.waveIdx>=G.totalWaves) return;
  // 提前奖励：根据节省的秒数给金币（首波 nextWaveAt=Infinity 时不奖励）
  if(early && isFinite(G.nextWaveAt)){
    const saved=Math.max(0, G.nextWaveAt - G.clock);
    if(saved>0){ const r=Math.round(saved*EARLY_REWARD_PER_SEC);
      G.gold+=r; flash(t('earlyBonus').replace('{n}',r)); }
  }
  scheduleWave(G.waveIdx);
  G.waveIdx++; G.phase='combat'; G.started=true;
  G.nextWaveAt = (G.waveIdx<G.totalWaves) ? G.clock + WAVE_INTERVAL : Infinity;
  updateWaveBtn(); refreshHUD();
}
function endGame(win){
  G.phase='done'; G.running=false;
  const M=G.M;
  // 无限模式：另算分（记录最佳波数）
  const EN=LANG==='en';
  if(M.endless){
    const wave=G.waveIdx;
    const key = M.eLevel===1?'endless1Best':'endless2Best';
    if((PROG[key]||0) < wave){ PROG[key]=wave; saveProg(PROG); }
    $('endTitle').innerHTML = win? (EN?'🏆 Endless Cleared!':'🏆 完美通关无限！') : (EN?'💀 Endless Over':'💀 无限模式结束');
    $('endText').textContent = (win?(EN?'You repelled all 60 waves! ':'你击退了全部 60 波！')
      :(EN?('You reached Wave '+wave+'. '):('你击退到第 '+wave+' 波')))
      +(EN?('Best: Wave '+(PROG[key]||0)):('（历史最佳：第 '+(PROG[key]||0)+' 波）'));
    $('nextBtn').style.display='none';
    $('ovEnd').style.display='flex'; return;
  }
  let extra='', stars=0;
  if(win){
    if(G.lives>=18) stars=3; else if(G.lives>=6) stars=2; else stars=1;
    if(!PROG.cleared[G.mi]){ PROG.cleared[G.mi]=true; saveProg(PROG);
      extra=EN?(' New rig unlocked! Rigs: '+mineCount()+'.'):(' 解锁新矿！现在共 '+mineCount()+' 矿。'); }
    if(!PROG.stars) PROG.stars=[];
    if((PROG.stars[G.mi]||0) < stars){ PROG.stars[G.mi]=stars; saveProg(PROG); }
  }
  const starStr = win ? ('⭐'.repeat(stars) + '☆'.repeat(3-stars)) : '';
  $('endTitle').innerHTML = win? `${t('win')}<br><span style="font-size:32px;letter-spacing:8px;color:#f5c451">${starStr}</span>` : t('lose');
  $('endText').textContent = win
    ? (EN?`Held «${mapName(M,G.mi)}» (${G.lives}/${G.livesMax} lives left).`:`守住了「${mapName(M,G.mi)}」（剩余 ${G.lives}/${G.livesMax} 生命）。`)+extra
    : (EN?`The line broke — you held to Wave ${Math.min(G.waveIdx,G.totalWaves)} of ${G.totalWaves}.`:`防线被攻破，坚持到第 ${Math.min(G.waveIdx,G.totalWaves)} 波 / 共 ${G.totalWaves} 波。`);
  const hasNext = win && G.mi<17 && unlocked(G.mi+1);  // 只在主线 1-18 自动跳下一关
  $('nextBtn').style.display = hasNext?'inline-block':'none';
  $('ovEnd').style.display='flex';
}

/* ---------- 主循环 ---------- */
let last=performance.now();
function loop(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  if(G&&G.running&&!paused&&G.phase!=='done'){ for(let s=0;s<speed;s++) step(dt); }
  draw(); updateSelLive(); refreshBuildMenu(); requestAnimationFrame(loop); }
// 建造菜单随金币变化实时刷新「可建/不可建」
function refreshBuildMenu(){
  const el=$('buildMenu'); if(!el||!el.classList.contains('on')||!G) return;
  const items=el.querySelectorAll('.bm');
  TKEYS.forEach((k,i)=>{ if(items[i]) items[i].classList.toggle('dis', G.gold<TOWERS[k].cost); });
}
function updateSelLive(){
  const tw=selectedTower; if(!tw||!G) return;
  const S=tw.S;
  if(tw.kind==='ammo'){
    const eA=$('liveAmmo'); if(!eA) return;
    eA.textContent = Math.round(tw.ammo)+'/'+S.ammoMax;
    const bar=$('liveAmmoBar'); if(bar){ bar.style.width=(tw.ammo/S.ammoMax*100)+'%';
      bar.style.background=tw.ammo<=0?'#c14b4b':'#f5c451'; }
    const btn=$('liveAmmoBtn'); if(btn) btn.textContent=(S.ammoMax-tw.ammo)*S.ammoCost;
    if(btn&&btn.parentElement) btn.parentElement.title=t('refill')+' ('+(S.ammoMax-tw.ammo)*S.ammoCost+' '+t('gold')+')';
  } else {
    const eS=$('liveSoldiers'); if(!eS) return;
    eS.textContent = tw.soldiers.length+'/'+S.count;
    const eW=$('liveWp'); if(eW) eW.textContent = Math.round(tw.wp)+'/'+S.wpMax;
    const bar=$('liveWpBar'); if(bar){ bar.style.width=(tw.wp/S.wpMax*100)+'%';
      bar.style.background=tw.wp<=0?'#c14b4b':'#8ad6a0'; }
    const btn=$('liveWpBtn'); if(btn) btn.textContent=Math.ceil((S.wpMax-tw.wp)*S.repair);
    if(btn&&btn.parentElement) btn.parentElement.title=t('repair')+' ('+Math.ceil((S.wpMax-tw.wp)*S.repair)+' '+t('gold')+')';
  }
}
function step(dt){
  if(G.started){ G.gold += mineIncomeOf(G.mines)*dt; G.clock += dt; }
  // 自动按时间间隔触发下一波（即使上一波没清完）
  while(G.started && G.waveIdx<G.totalWaves && G.clock>=G.nextWaveAt){
    flash(t('waveIncoming').replace('{n}',G.waveIdx+1)); launchWave(false);
  }
  // 按绝对时间从 spawnList 出兵
  while(G.spawnList.length && G.spawnList[0].spawnAt <= G.clock){
    const s=G.spawnList.shift(); G.enemies.push(new Enemy(s.type, s.hpMul));
    triggerIntroIfNew(s.type);   // 首次出场敌人 → 暂停弹介绍卡
  }
  // 胜负：所有波已排程 + 出完 + 没活敌人 = 胜利
  if(G.started && G.phase!=='done' && G.waveIdx>=G.totalWaves && G.spawnList.length===0 && G.enemies.length===0){
    endGame(true); return;
  }
  updateWaveBtn();
  for(const e of G.enemies){ if(e.dead||e.leaked) continue; e.update(dt);
    if(e.leaked){ if(e.blocker)e.blocker=null; G.lives--; flash(t('leak'));
      if(G.lives<=0){ refreshHUD(); endGame(false); return; } } }
  if(G.pendingEnemies.length){ for(const e of G.pendingEnemies) G.enemies.push(e); G.pendingEnemies.length=0; }
  for(const t of G.towers) t.update(dt);
  for(const s of G.shots) s.update(dt);
  for(const b of G.blasts) b.life-=dt;
  // 燃烧地带（燃油弹特性）
  for(const z of G.zones){ z.life-=dt;
    for(const e of G.enemies){ if(e.dead||e.leaked) continue;
      if(dist(z.x,z.y,e.x,e.y)<=z.r){ e.hp-=z.dps*dt; if(e.hp<=0) e.dead=true; } } }
  // 清理死亡敌人的 blocker 引用
  for(const t of G.towers){ if(t.kind==='weapon') for(const s of t.soldiers)
    if(s.target&&(s.target.dead||s.target.leaked)){ if(s.target.blocker===s)s.target.blocker=null; s.target=null; } }
  G.enemies=G.enemies.filter(e=>!e.dead&&!e.leaked);
  G.shots=G.shots.filter(s=>!s.dead);
  G.blasts=G.blasts.filter(b=>b.life>0);
  G.zones=G.zones.filter(z=>z.life>0);
  refreshHUD();
}

/* ---------- 渲染 ---------- */
function draw(){
  ctx.clearRect(0,0,GW,GH);
  if(!G){ return; }
  const T=performance.now()/1000;
  // 主题背景（地球 / 宇宙 / 地狱）
  const TH=THEMES[G.theme||'space']||THEMES.space;
  let bg=ctx.createLinearGradient(0,0,GW,GH);
  bg.addColorStop(0,TH.grad[0]); bg.addColorStop(.5,TH.grad[1]); bg.addColorStop(1,TH.grad[2]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,GW,GH);
  if(G.stars){ for(const s of G.stars){ const a=0.3+0.5*Math.sin(T*s.sp+s.ph);
    ctx.globalAlpha=Math.max(0.06,a); ctx.fillStyle=TH.starColor+Math.max(0.06,a)+')';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); } ctx.globalAlpha=1; }
  if(G.planets){ for(const p of G.planets){
    if(p.ring){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.scale(1,0.34);
      ctx.strokeStyle='rgba(190,205,255,.4)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,p.r*1.7,0,7); ctx.stroke(); ctx.restore(); }
    const rg=ctx.createRadialGradient(p.x-p.r*0.35,p.y-p.r*0.35,p.r*0.12,p.x,p.y,p.r);
    rg.addColorStop(0,p.c0); rg.addColorStop(1,p.c1);
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1; ctx.stroke();
  } }
  // 路（可能多条：分叉/汇合）
  ctx.lineJoin='round'; ctx.lineCap='round';
  for(const pass of [{w:60,c:'#3a3322'},{w:36,c:'#4a4030'}]){
    ctx.strokeStyle=pass.c; ctx.lineWidth=pass.w;
    for(const rt of G.routes){ ctx.beginPath(); ctx.moveTo(rt[0][0],rt[0][1]);
      for(let i=1;i<rt.length;i++) ctx.lineTo(rt[i][0],rt[i][1]); ctx.stroke(); }
  }
  const ep=G.path[G.path.length-1];
  ctx.fillStyle='#ff6b6b'; ctx.beginPath(); ctx.arc(ep[0],ep[1],18,0,7); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏰',ep[0],ep[1]);
  // 建造位
  for(const p of G.pads){
    if(p.tower) continue;
    const hov = selectedBuild && dist(mouse.x,mouse.y,p.x,p.y)<16;
    ctx.fillStyle = hov? 'rgba(95,174,95,.5)' : 'rgba(120,140,165,.16)';
    ctx.strokeStyle = hov? '#6cc66c' : 'rgba(140,160,185,.4)';
    ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(p.x,p.y,13,0,7); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(140,160,185,.5)'; ctx.beginPath();
    ctx.moveTo(p.x-5,p.y); ctx.lineTo(p.x+5,p.y); ctx.moveTo(p.x,p.y-5); ctx.lineTo(p.x,p.y+5); ctx.stroke();
  }
  if(selectedBuild){
    let np=null,bd=18; for(const p of G.pads){ if(p.tower)continue; const d=dist(mouse.x,mouse.y,p.x,p.y); if(d<bd){bd=d;np=p;} }
    if(np){ ctx.beginPath(); ctx.strokeStyle='rgba(245,196,81,.5)';
      ctx.arc(np.x,np.y,TOWERS[selectedBuild].tiers[0].range,0,7); ctx.stroke(); }
  }
  // 塔
  for(const t of G.towers){
    if(t===selectedTower){ ctx.beginPath(); ctx.fillStyle='rgba(245,196,81,.07)';
      ctx.arc(t.x,t.y,t.S.range,0,7); ctx.fill(); ctx.strokeStyle='rgba(245,196,81,.4)'; ctx.stroke(); }
    const empty = t.kind==='ammo' && t.ammo<=0;
    ctx.save(); ctx.translate(t.x,t.y);
    ctx.fillStyle = empty?'#3c3f45':'#27313f'; ctx.beginPath(); ctx.arc(0,0,17,0,7); ctx.fill();
    if(t.kind==='ammo' && t.key!=='barracks'){ ctx.save(); ctx.rotate(t.ang);
      ctx.fillStyle=empty?'#5a5f66':t.def.color; ctx.fillRect(0,-3,19,6); ctx.restore(); }
    towerArt(ctx,t.key,t.tier,13,t.def.color,empty);
    for(let i=0;i<t.tier;i++){ ctx.fillStyle='#f5c451'; ctx.beginPath(); ctx.arc(-8+i*8,-21,2.4,0,7); ctx.fill(); }
    ctx.restore();
    // 资源条
    const w=30,bx=t.x-w/2,by=t.y+20;
    if(t.kind==='ammo'){ ctx.fillStyle='#2a2f3a'; ctx.fillRect(bx,by,w,4);
      ctx.fillStyle=empty?'#c14b4b':'#f5c451'; ctx.fillRect(bx,by,w*(t.ammo/t.S.ammoMax),4);
      if(empty){ ctx.fillStyle='#ff6b6b'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText('无弹',t.x,t.y-26); } }
    else { ctx.fillStyle='#2a2f3a'; ctx.fillRect(bx,by,w,4);
      ctx.fillStyle=t.wp<=0?'#c14b4b':'#8ad6a0'; ctx.fillRect(bx,by,w*(t.wp/t.S.wpMax),4);
      if(t.wp<=0){ ctx.fillStyle='#ff6b6b'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText('武器损坏',t.x,t.y-26); } }
  }
  // 集结点（选中兵营或正在设置时显示旗帜 + 范围）
  const rallyT = rallySetFor || (selectedTower&&selectedTower.kind==='weapon'?selectedTower:null);
  if(rallyT && rallyT.rally){
    if(rallySetFor===rallyT){ ctx.beginPath(); ctx.strokeStyle='rgba(138,214,160,.5)';
      ctx.setLineDash([6,5]); ctx.arc(rallyT.x,rallyT.y,rallyT.S.range,0,7); ctx.stroke(); ctx.setLineDash([]); }
    const rx=rallyT.rally.x, ry=rallyT.rally.y;
    ctx.strokeStyle='rgba(138,214,160,.4)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(rallyT.x,rallyT.y); ctx.lineTo(rx,ry); ctx.stroke();
    ctx.strokeStyle='#6f5b3a'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(rx,ry+8); ctx.lineTo(rx,ry-12); ctx.stroke();
    ctx.fillStyle='#8ad6a0'; ctx.beginPath(); ctx.moveTo(rx,ry-12); ctx.lineTo(rx+13,ry-8); ctx.lineTo(rx,ry-4); ctx.closePath(); ctx.fill();
  }
  // 士兵
  for(const t of G.towers){ if(t.kind!=='weapon') continue;
    for(const s of t.soldiers){ ctx.fillStyle='#d8c98a'; ctx.strokeStyle='#10151c'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(s.x,s.y,6,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#000'; ctx.fillRect(s.x-7,s.y-11,14,2.5);
      ctx.fillStyle='#5fae5f'; ctx.fillRect(s.x-7,s.y-11,14*Math.max(0,s.hp/s.maxhp),2.5); } }
  // 燃烧地带
  for(const z of G.zones){ const a=Math.min(1,z.life/z.max);
    const zg=ctx.createRadialGradient(z.x,z.y,2,z.x,z.y,z.r);
    zg.addColorStop(0,'rgba(255,150,50,'+(0.35*a)+')'); zg.addColorStop(1,'rgba(255,90,30,0)');
    ctx.fillStyle=zg; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,7); ctx.fill(); }
  // 子弹/爆炸
  for(const s of G.shots){ ctx.strokeStyle=s.col; ctx.lineWidth=s.S.splash>0?4:2;
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-(s.tgt.x-s.x)*.06,s.y-(s.tgt.y-s.y)*.06); ctx.stroke();
    ctx.fillStyle=s.col; ctx.beginPath(); ctx.arc(s.x,s.y,3,0,7); ctx.fill(); }
  for(const b of G.blasts){ const a=b.life/b.max; ctx.strokeStyle='rgba(255,150,70,'+a+')'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r*(1.1-a*.5),0,7); ctx.stroke(); }
  // 敌人
  for(const e of G.enemies){ if(e.dead) continue;
    ctx.save(); ctx.translate(e.x,e.y); enemyArt(ctx,e); ctx.restore();
    if(e.slowF<1){ ctx.strokeStyle='#7fdfff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x,e.y,e.r+3,0,7); ctx.stroke(); }
    if(e.burnT>0){ ctx.strokeStyle='rgba(255,140,60,.8)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x,e.y,e.r+3,0,7); ctx.stroke(); }
    const w=e.r*2.2,hx=e.x-w/2,hy=e.y-e.r-7;
    ctx.fillStyle='#000'; ctx.fillRect(hx,hy,w,3);
    ctx.fillStyle=e.hp/e.maxhp>.4?'#5fae5f':'#d66'; ctx.fillRect(hx,hy,w*Math.max(0,e.hp/e.maxhp),3); }
  // 角落矿石指示
  ctx.fillStyle='rgba(20,26,34,.82)'; ctx.strokeStyle='#344256'; ctx.lineWidth=1;
  roundRect(12,GH-44,176,32,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#8ad6a0'; ctx.font='13px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(t('mineHud').replace('{n}',G.mines).replace('{g}',mineIncomeOf(G.mines).toFixed(1)), 24, GH-28);
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ---------- 输入（指针事件：鼠标 + 触摸通用） ---------- */
cv.style.touchAction='none';
function toGame(e){ const b=cv.getBoundingClientRect();
  return { x:(e.clientX-b.left)*(GW/b.width), y:(e.clientY-b.top)*(GH/b.height) }; }
function handleTap(mx,my){
  if(!G||G.phase==='done') return;
  closeBuildMenu();
  // 设置兵营集结点：点地图放置（限制在塔射程内）
  if(rallySetFor){ const t=rallySetFor; let dx=mx-t.x, dy=my-t.y;
    const dd=Math.hypot(dx,dy), R=t.S.range;
    if(dd>R){ dx=dx/dd*R; dy=dy/dd*R; }
    t.rally={x:t.x+dx, y:t.y+dy}; t.rallyUser=true;
    rallySetFor=null; flash(LANG==='en'?'Rally point set':'集结点已设定'); renderSel(); return; }
  const TOL=(typeof PLAT!=='undefined'?PLAT.tap:24);
  // 已建的塔优先（点它=升级面板）
  let pick=null,bt=TOL; for(const t of G.towers){ const d=dist(mx,my,t.x,t.y); if(d<bt){bt=d;pick=t;} }
  if(pick){ selectedTower=pick; renderSel(); return; }
  // 空建造位 → 在它旁边弹出建造菜单
  let np=null,bp=TOL; for(const p of G.pads){ if(p.tower)continue; const d=dist(mx,my,p.x,p.y); if(d<bp){bp=d;np=p;} }
  if(np){ selectedTower=null; renderSel(); openBuildMenu(np); return; }
  // 点空白：收起
  selectedTower=null; renderSel();
}
function openBuildMenu(pad){
  const el=$('buildMenu'); el.innerHTML=''; G._buildPad=pad;
  for(const k of TKEYS){ const d=TOWERS[k], aff=G.gold>=d.cost;
    const b=document.createElement('div'); b.className='bm'+(aff?'':' dis');
    const ic=document.createElement('canvas'); ic.width=30; ic.height=30;
    const g=ic.getContext('2d'); g.translate(15,15); towerArt(g,k,1,11,d.color,false);
    b.appendChild(ic);
    const nm=document.createElement('div'); nm.className='nm'; nm.textContent=nmTower(k,1); b.appendChild(nm);
    const ct=document.createElement('div'); ct.className='ct'; ct.textContent=d.cost+t('gold'); b.appendChild(ct);
    b.onclick=()=>{ if(G.gold<d.cost){ flash(t('needGold').replace('{n}',d.cost)); return; }
      if(pad.tower){ closeBuildMenu(); return; }
      G.gold-=d.cost; const tw=new Tower(k,pad); G.towers.push(tw);
      closeBuildMenu(); selectedTower=tw; renderSel(); refreshHUD(); };
    el.appendChild(b);
  }
  el.style.left=pad.x+'px'; el.style.top=(pad.y-16)+'px';
  el.classList.add('on');
}
function closeBuildMenu(){ const el=$('buildMenu'); if(el){ el.classList.remove('on'); el.innerHTML=''; } if(G) G._buildPad=null; }
let _pDown=null;
cv.addEventListener('pointermove',e=>{ const p=toGame(e); mouse.x=p.x; mouse.y=p.y; }, {passive:true});
cv.addEventListener('pointerdown',e=>{ e.preventDefault(); const p=toGame(e);
  mouse.x=p.x; mouse.y=p.y; _pDown={x:p.x,y:p.y}; });
cv.addEventListener('pointerup',e=>{ e.preventDefault(); const p=toGame(e);
  mouse.x=p.x; mouse.y=p.y; if(_pDown) handleTap(p.x,p.y); _pDown=null; });
cv.addEventListener('pointercancel',()=>{ _pDown=null; });
// 阻止 iOS 双击缩放 / 长按选择 / 橡皮筋滚动
['gesturestart','gesturechange','contextmenu'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault()));
document.addEventListener('touchmove',e=>{ if(e.target===cv) e.preventDefault(); }, {passive:false});

// 返回紧凑图标按钮（进入 .acts 行）
function perkBlockHTML(tw){
  if(tw.tier<3){
    const evo=nmTower(tw.key,tw.tier+1), c=tw.upCost();
    const dim=G.gold>=c?'':' dim';
    return `<button class="bUp${dim}" id="bUp" title="${t('upTo').replace('{n}','Lv'+(tw.tier+1)+' '+evo).replace('{c}',c)}"><span class="ig">⬆</span><i class="ct">${c}</i></button>`;
  }
  const pc=Math.round(tw.def.cost*2); let h='';
  for(const pk of tw.def.perks){
    const pn=perkName(pk), pd=perkDesc(pk);
    if(tw.perks[pk.key])
      h+=`<button disabled title="${pn} — ${pd}"><span class="ig" style="color:#9fe0a8">✓</span><i class="ct">${pn}</i></button>`;
    else {
      const dim=G.gold>=pc?'':' dim';
      h+=`<button class="bUp${dim}" id="perk_${pk.key}" title="${pn} — ${pd} (${pc} ${t('gold')})"><span class="ig">✦</span><i class="ct">${pn}</i></button>`;
    }
  }
  return h;
}
function renderSel(){
  const p=$('topPanel'); if(!selectedTower){ p.style.display='none'; p.innerHTML=''; return; }
  const tw=selectedTower, d=tw.def, S=tw.S; p.style.display='block';
  let body=`<button id="pClose">×</button><div style="font-size:14px;font-weight:bold;color:${d.color}">${nmTower(tw.key,tw.tier)} · Lv${tw.tier}${S.evo?' ✦':''}</div>`;

  if(tw.kind==='ammo'){
    body+=`<div class="stat">${t('dmg')} ${S.dmg} · ${t('range')} ${Math.round(S.range)}<br>${t('ammo')} <span id="liveAmmo">${Math.round(tw.ammo)}/${S.ammoMax}</span> · ${t('perShot')} ${S.ammoCost}${t('gold')}</div>
      <div class="bar"><i id="liveAmmoBar" style="width:${tw.ammo/S.ammoMax*100}%;background:${tw.ammo<=0?'#c14b4b':'#f5c451'}"></i></div>
      <div class="acts">
        <button class="bAmmo" id="bAmmo" title="${t('refill')} (${(S.ammoMax-tw.ammo)*S.ammoCost} ${t('gold')})"><span class="ig">🔄</span><i class="ct" id="liveAmmoBtn">${(S.ammoMax-tw.ammo)*S.ammoCost}</i></button>
        ${perkBlockHTML(tw)}
        ${sellBtn}
      </div>`;
  } else {
    body+=`<div class="stat">${t('soldiers')} <span id="liveSoldiers">${tw.soldiers.length}/${S.count}</span> · ${t('perSoldier')} ${S.sDmg}/${S.sHp}<br>${t('weapon')} <span id="liveWp">${Math.round(tw.wp)}/${S.wpMax}</span></div>
      <div class="bar"><i id="liveWpBar" style="width:${tw.wp/S.wpMax*100}%;background:${tw.wp<=0?'#c14b4b':'#8ad6a0'}"></i></div>
      <div class="acts">
        <button class="bAmmo" id="bWp" title="${t('repair')} (${Math.ceil((S.wpMax-tw.wp)*S.repair)} ${t('gold')})"><span class="ig">🔧</span><i class="ct" id="liveWpBtn">${Math.ceil((S.wpMax-tw.wp)*S.repair)}</i></button>
        <button class="bUp${rallySetFor===tw?' dim':''}" id="bRally" title="${rallySetFor===tw?t('rallyGo'):t('rally')}"><span class="ig">📍</span><i class="ct">${t('rally')}</i></button>
        ${perkBlockHTML(tw)}
        ${sellBtn}
      </div>`;
  }
  p.innerHTML=body;
  const fNeed=()=>flash(LANG==='en'?'Not enough credits':'金币不足');
  if($('bAmmo')) $('bAmmo').onclick=()=>{ const refill=S.ammoMax-tw.ammo; if(refill<=0){flash(LANG==='en'?'Ammo full':'弹药已满');return;}

/* ---------- 背景音乐（程序生成，无需外部文件） ---------- */
let AC=null, musicTimer=null, _mbus=null, _mdrone=null;
let musicOn = (localStorage.getItem('oredef_music')==='on');   // 默认静音，且记住选择
function startMusic(){
  if(!musicOn) return;
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; } }
  if(AC.state==='suspended') AC.resume();
  if(musicTimer) return;
  // 古老·刺激的部落战鼓（全程程序生成，离线可用）
  if(_mbus){ try{_mbus.disconnect();}catch(e){} }
  if(_mdrone){ try{_mdrone.o.stop();}catch(e){} _mdrone=null; }
  const bus=AC.createGain(); bus.gain.value=0.30; bus.connect(AC.destination); _mbus=bus;
  // 白噪声缓冲（鼓皮 / 沙锤）
  const nb=AC.createBuffer(1,AC.sampleRate*0.5,AC.sampleRate);
  { const d=nb.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
  function noise(dur,g,hp,lp){ const s=AC.createBufferSource(); s.buffer=nb;
    const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=(hp+lp)/2; bp.Q.value=0.7;
    const ga=AC.createGain(); s.connect(bp); bp.connect(ga); ga.connect(bus);
    const t=AC.currentTime; ga.gain.setValueAtTime(g,t); ga.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.start(t); s.stop(t+dur+0.02); }
  // 战鼓 / 大鼓：膜鼓音（正弦 + 急速降调）
  function drum(f0,f1,dur,g){ const o=AC.createOscillator(), ga=AC.createGain();
    o.type='sine'; o.connect(ga); ga.connect(bus); const t=AC.currentTime;
    o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+dur*0.7);
    ga.gain.setValueAtTime(g,t); ga.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.03);
    noise(0.05,g*0.35,400,2200); }                       // 鼓皮敲击瞬态
  // 低吟号角 / 古老吟唱（锯齿 + 颤音）
  function horn(freq,dur,g){ const o=AC.createOscillator(), ga=AC.createGain(),
    lf=AC.createOscillator(), lg=AC.createGain();
    o.type='sawtooth'; o.frequency.value=freq; lf.type='sine'; lf.frequency.value=5.5;
    lg.gain.value=freq*0.012; lf.connect(lg); lg.connect(o.frequency);
    const fl=AC.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=900;
    o.connect(fl); fl.connect(ga); ga.connect(bus); const t=AC.currentTime;
    ga.gain.setValueAtTime(0.0001,t); ga.gain.linearRampToValueAtTime(g,t+0.08);
    ga.gain.setValueAtTime(g,t+dur*0.6); ga.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); lf.start(t); o.stop(t+dur+0.05); lf.stop(t+dur+0.05); }
  // 低音持续 drone（远古氛围）
  let drone=null;
  function setDrone(freq){ if(drone){ try{drone.o.stop();}catch(e){} }
    const o=AC.createOscillator(), ga=AC.createGain(), fl=AC.createBiquadFilter();
    o.type='triangle'; o.frequency.value=freq; fl.type='lowpass'; fl.frequency.value=320;
    o.connect(fl); fl.connect(ga); ga.connect(bus);
    ga.gain.setValueAtTime(0.0001,AC.currentTime); ga.gain.linearRampToValueAtTime(0.10,AC.currentTime+0.6);
    o.start(); drone={o,ga}; _mdrone=drone; }
  // 弗里几亚调式（古老/紧张感）低音根音循环
  const phr=[0,1,3,5,7,8,10], roots=[55,55,49,58], BIG=[0,3,6,8,11,14], MID=[4,12], SKIN=[2,5,7,10,13];
  let step=0;
  function tick(){
    const s=step%16, bar=Math.floor(step/16);
    if(s===0) setDrone(roots[bar%roots.length]);                 // 每小节换 drone 根音
    if(BIG.indexOf(s)>=0) drum(150,52,0.30,0.95);                // 大战鼓（驱动）
    if(MID.indexOf(s)>=0) drum(230,120,0.18,0.6);                // 中鼓
    if(SKIN.indexOf(s)>=0) noise(0.09,0.5,300,1500);             // 手鼓皮
    noise(0.03, s%2?0.10:0.20, 5000,9000);                       // 沙锤：步步不停 → 刺激
    if(bar%2===1 && s===0){ const r=roots[bar%roots.length];     // 每两小节一句古老号角
      horn(r*Math.pow(2,phr[(Math.random()*phr.length)|0]/12), 1.5, 0.16); }
    if(bar%4===3 && s>=12){ drum(260-( s-12)*20,90,0.14,0.55); noise(0.05,0.3,300,1600); } // 收尾鼓花
    step++;
  }
  tick(); musicTimer=setInterval(tick,140);                      // ~ 紧凑战鼓节奏
}
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; }
  if(_mdrone){ try{_mdrone.o.stop();}catch(e){} _mdrone=null; }
  if(_mbus){ try{_mbus.disconnect();}catch(e){} _mbus=null; }
  if(AC && AC.state==='running'){ try{ AC.suspend(); }catch(e){} } }

/* ---------- 音效（程序生成，独立于音乐开关） ---------- */
let sfxOn = (localStorage.getItem('sh_sfx')!=='off');   // 默认开
function ensureAC(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  if(AC.state==='suspended') AC.resume(); return AC; }
let _sfxNB=null;
function sfxNoise(ac){ if(!_sfxNB){ _sfxNB=ac.createBuffer(1,ac.sampleRate*0.4,ac.sampleRate);
  const d=_sfxNB.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; } return _sfxNB; }
function sfx(kind){
  if(!sfxOn) return;
  const ac=ensureAC(); if(!ac||ac.state!=='running') return;
  const t=ac.currentTime, out=ac.createGain(); out.connect(ac.destination);
  if(kind==='arrow'){ out.gain.value=0.16;
    const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(220,t+0.1);
    g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.connect(g); g.connect(out); o.start(t); o.stop(t+0.14);
  } else if(kind==='magic'){ out.gain.value=0.15;
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
    o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(1500,t+0.18);
    const lf=ac.createOscillator(),lg=ac.createGain(); lf.frequency.value=30; lg.gain.value=120;
    lf.connect(lg); lg.connect(o.frequency); lf.start(t); lf.stop(t+0.22);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.9,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.22); o.connect(g); g.connect(out); o.start(t); o.stop(t+0.24);
  } else if(kind==='boom'){ out.gain.value=0.3;
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
    o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(38,t+0.25);
    g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
    o.connect(g); g.connect(out); o.start(t); o.stop(t+0.34);
    const s=ac.createBufferSource(); s.buffer=sfxNoise(ac);
    const bp=ac.createBiquadFilter(); bp.type='lowpass'; bp.frequency.value=1400;
    const ng=ac.createGain(); ng.gain.setValueAtTime(0.7,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    s.connect(bp); bp.connect(ng); ng.connect(out); s.start(t); s.stop(t+0.32);
  } else if(kind==='deploy'){ out.gain.value=0.18;
    const o=ac.createOscillator(),g=ac.createGain(); o.type='square';
    o.frequency.setValueAtTime(180,t); o.frequency.linearRampToValueAtTime(360,t+0.12);
    g.gain.setValueAtTime(0.7,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
    o.connect(g); g.connect(out); o.start(t); o.stop(t+0.18);
  } else if(kind==='pause'){ out.gain.value=0.22;          // 暂停：下行双音 + 低闷击
    const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(660,t); o.frequency.exponentialRampToValueAtTime(220,t+0.18);
    g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.connect(g); g.connect(out); o.start(t); o.stop(t+0.24);
    const o2=ac.createOscillator(),g2=ac.createGain(); o2.type='sine';
    o2.frequency.setValueAtTime(120,t+0.06); o2.frequency.exponentialRampToValueAtTime(60,t+0.22);
    g2.gain.setValueAtTime(0.6,t+0.06); g2.gain.exponentialRampToValueAtTime(0.001,t+0.26);
    o2.connect(g2); g2.connect(out); o2.start(t+0.06); o2.stop(t+0.28);
  } else if(kind==='resume'){ out.gain.value=0.22;         // 继续：上行双音
    const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(280,t); o.frequency.exponentialRampToValueAtTime(820,t+0.14);
    g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.connect(g); g.connect(out); o.start(t); o.stop(t+0.2);
  }
}

      rows.push([EN?'Damage type':'伤害类型',tw.tiers.map(x=>x.type==='magic'?(EN?'Magic':'魔法'):(EN?'Physical':'物理'))]);
      rows.push([EN?'Hits air':'可击空中',tw.tiers.map(x=>x.air?(EN?'Yes':'是'):(EN?'No':'否'))]);
      rows.push([EN?'Special':'特殊',tw.tiers.map(x=> x.slow?((EN?'Slow ×':'减速 ×')+x.slow):x.burn?((EN?'Burn ':'灼烧 ')+x.burn+(EN?'/s · ':' /秒 · ')+x.burnT+'s'):'—')]);
    } else {
      rows.push([EN?'Troops':'士兵数',tw.tiers.map(x=>x.count)]);
      rows.push([EN?'Troop HP':'单兵血量',tw.tiers.map(x=>x.sHp)]);
      rows.push([EN?'Troop DMG':'单兵伤害',tw.tiers.map(x=>x.sDmg)]);
      rows.push([EN?'Troop armour':'士兵护甲',tw.tiers.map(x=>x.armor||0)]);
      rows.push([EN?'Weapon durability':'武器耐久',tw.tiers.map(x=>x.wpMax)]);
      rows.push([EN?'Repair cost':'修武器单价',tw.tiers.map(x=>x.repair+(EN?'/pt':' 金/耐久'))]);
      rows.push([EN?'Range / rally':'射程/集结',tw.tiers.map(x=>x.range)]);
    }
    statsHTML=`<table><thead><tr><th>${EN?'Stat':'属性'}</th><th>${EN?'T1':'1 阶'}</th><th>${EN?'T2':'2 阶'}</th><th>${EN?'T3 ✦':'3 阶 ✦'}</th></tr></thead><tbody>`+
      rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1][0]}</td><td>${r[1][1]}</td><td>${r[1][2]}</td></tr>`).join('')+`</tbody></table>`;
  } else {
    const e=ENEMIES[key];
    lore=codexLore('enemy',key);
    nm=nmEnemy(key); role=EN?'Hostile unit':'敌方单位';
    icon=`<canvas width="64" height="64"></canvas>`;
    const rows=[
      [EN?'HP':'血量',e.hp], [EN?'Speed':'移速',e.speed], [EN?'Armour':'护甲',e.armor], [EN?'Magic res.':'魔抗',e.mres||0],
      [EN?'Flying':'可飞行',e.air?(EN?'Yes':'是'):(EN?'No':'否')], [EN?'Melee DMG':'近战伤害（对士兵）', e.mdmg],
    ];
    statsHTML=`<table><tbody>`+rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')+`</tbody></table>`;
  }
  det.innerHTML=`<div class="head">${icon}<div><div class="nm">${nm}</div><div class="role">${role}</div></div></div>
    <div class="intro">${EN?'':'「'}${lore.intro}${EN?'':'」'}</div>
    <h5>${t('cBg')}</h5><p>${lore.origin}</p>
    <h5>${t('cHabit')}</h5><p>${lore.habits}</p>
    <h5>${t('cTrait')}</h5><ul>${lore.traits.map(x=>`<li>${x}</li>`).join('')}</ul>
    <h5>${t('cStats')}</h5>${statsHTML}
    <button class="back" id="cdxToList">${t('backCodex')}</button>`;
  el.appendChild(det);
  // 画图标
  const c=det.querySelector('.head canvas'), g=c.getContext('2d'); g.translate(32,32);
  if(kind==='tower') towerArt(g, key, 3, 22, TOWERS[key].color, false);
  else { const e=ENEMIES[key]; enemyArt(g,{type:key,r:Math.min(22,e.r+4),def:e}); }
  $('cdxToList').onclick=showCodex;
}
/* ---- 星战式剧情滚动 ---- */
let _introTimer=null,_introNext=null;
function playIntro(mi){
  _introNext=mi;
  const m=MAPS[mi];
  const story = (LANG==='en' && m.storyEn) ? m.storyEn : (m.story||'');
  const para=story.split('\n').map(s=>`<p>${s}</p>`).join('');
  const chapter = LANG==='en' ? ('Chapter '+(mi+1)) : ('第 '+(mi+1)+' 章');
  $('crawl').innerHTML=`<div class="ttl">${chapter}<br>${mapName(m,mi)}</div>${para}`;
  hideOverlays(); $('ovStory').style.display='flex';
  // 重启 CSS 动画
  const cr=$('crawl'); cr.style.animation='none'; void cr.offsetWidth; cr.style.animation='';
  if(musicOn) startMusic();
  clearTimeout(_introTimer);
  _introTimer=setTimeout(()=>finishIntro(), 30000);
}
function finishIntro(){ clearTimeout(_introTimer); if(_introNext==null) return;
  const mi=_introNext; _introNext=null; startGame(mi); }
$('storySkip').onclick=finishIntro;
$('toCodex').onclick=showCodex;
$('codexBack').onclick=()=>{ hideOverlays(); $('ovMenu').style.display='flex'; };
$('toMapSel').onclick=showMapSel;
$('backMenu').onclick=()=>{ hideOverlays(); $('ovMenu').style.display='flex'; };
$('mapBtn').onclick=showMapSel;
$('retryBtn').onclick=()=>playIntro(G.mi);
$('nextBtn').onclick=()=>playIntro(G.mi+1);
$('resetProg').onclick=()=>{ PROG={cleared:Array(LEVELS).fill(false),stars:[],seenEnemies:{}}; saveProg(PROG); buildMapCards(); flash(LANG==='en'?'Progress reset':'进度已重置'); };
function mapThumb(path){
  const c=document.createElement('canvas'); c.className='thumb'; c.width=160; c.height=104;
  const g=c.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,104);
  grd.addColorStop(0,'#243049'); grd.addColorStop(1,'#161d2c'); g.fillStyle=grd; g.fillRect(0,0,160,104);
  // 几颗星点缀
  g.fillStyle='rgba(255,255,255,.5)';
  for(let s=0;s<14;s++){ g.globalAlpha=0.2+Math.random()*0.5;
    g.fillRect((Math.random()*160)|0,(Math.random()*104)|0,1.5,1.5); }
  g.globalAlpha=1;
  const pad=12, sx=(160-pad*2)/GW, sy=(104-pad*2)/GH;
  g.strokeStyle='#6f7da0'; g.lineWidth=6; g.lineJoin='round'; g.lineCap='round';
  g.beginPath();
  path.forEach((p,k)=>{ const X=pad+p[0]*sx, Y=pad+p[1]*sy; k?g.lineTo(X,Y):g.moveTo(X,Y); });
  g.stroke();
  g.strokeStyle='#aab7d6'; g.lineWidth=2.5; g.stroke();
  // 起点/终点
  const a=path[0], b=path[path.length-1];
  g.fillStyle='#8ad6a0'; g.beginPath(); g.arc(pad+a[0]*sx,pad+a[1]*sy,4,0,7); g.fill();
  g.fillStyle='#ff6b6b'; g.beginPath(); g.arc(pad+b[0]*sx,pad+b[1]*sy,4,0,7); g.fill();
  return c;
}
function buildMapCards(){
  $('mineHdr').textContent=t('mineHdr').replace('{n}',mineCount()).replace('{g}',mineIncomeOf(mineCount()).toFixed(1));
  const el=$('mapCards'); el.innerHTML='';
  MAPS.forEach((m,i)=>{
    const lock=!unlocked(i);
    const isEnd=!!m.endless;
    const done = !isEnd && PROG.cleared[i];
    const s=(PROG.stars&&PROG.stars[i])||0;
    const starTxt = (!isEnd && done) ? '<div style="color:#f5c451;font-size:13px;margin-top:2px">'+'⭐'.repeat(s)+'☆'.repeat(3-s)+'</div>' : '';
    const endBest = isEnd ? (PROG[m.eLevel===1?'endless1Best':'endless2Best']||0) : 0;
    const d=document.createElement('div'); d.className='mapcard'+(lock?' lock':'')+(isEnd?' endless':'');
    const EN=LANG==='en';
    let tag;
    if(lock) tag='<span class="tag lk">'+(EN?'Locked':'未解锁')+'</span>';
    else if(isEnd) tag='<span class="tag hard">'+(EN?'Endless ∞':'无限 ∞')+'</span>';
    else if(done) tag='<span class="tag done">'+(EN?'✓ Cleared':'✓ 已通关')+'</span>';
    else tag='<span class="tag '+(m.diff==='hard'?'hard':'mid')+'">'+(m.diff==='hard'?(EN?'Hard':'困难'):(EN?'Normal':'普通'))+'</span>';
    const label = isEnd ? (i+'. '+mapName(m,i)) : ((i+1)+'. '+mapName(m,i));
    const detail = isEnd
      ? (EN?`Lives 20 · Waves ∞<br>Best: Wave ${endBest}`:`生命 20 · 波数 ∞<br>历史最佳：第 ${endBest} 波`)
      : (EN?`Lives 20 · ${m.waves.length} waves<br>Final BOSS · ${mineCount()} rigs${starTxt}`
           :`生命 20 · ${m.waves.length} 波<br>末波 BOSS · 进场 ${mineCount()} 矿${starTxt}`);
    d.innerHTML=`<h4>${label}</h4><div class="d">${detail}</div>${tag}`;
    d.insertBefore(mapThumb(m.path), d.firstChild);
    if(!lock) d.onclick=()=>playIntro(i);
    el.appendChild(d);
  });
}
/* ---------- 自适应缩放 + 横竖屏 ---------- */
function fitStage(){
  const W=window.innerWidth, H=window.innerHeight;
  const scale=Math.min(W/1240, H/620);
  const st=$('stage'); st.style.transform='scale('+scale+')';
  // 窄屏竖屏时提示横屏（仍可游玩，仅提示）
  const portrait = H>W && W<820;
  $('rotate').style.display = portrait ? 'flex' : 'none';
}
window.addEventListener('resize',fitStage);
window.addEventListener('orientationchange',()=>setTimeout(fitStage,150));
/* ---------- 语言切换 ---------- */
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(e=>{ e.textContent=t(e.dataset.i18n); });
  document.querySelectorAll('[data-i18h]').forEach(e=>{ e.innerHTML=t(e.dataset.i18h); });
  document.documentElement.lang = (LANG==='en')?'en':'zh';
  if($('langbtn')) $('langbtn').textContent=t('langBtn');
  if($('settingsbtn')) $('settingsbtn').textContent=t('settings');
  if($('pausebtn')) $('pausebtn').textContent = (typeof paused!=='undefined'&&paused)?t('resume'):t('pause');
  if(typeof syncAdminBtn==='function') syncAdminBtn();
  if(G){ updateWaveBtn(); refreshHUD(); renderSel(); }
  if($('ovMap').style.display==='flex') buildMapCards();
  if($('ovCodex').style.display==='flex') showCodex();
}
function toggleLang(){ LANG=(LANG==='en')?'zh':'en'; localStorage.setItem('sh_lang',LANG); applyLang(); }
$('langbtn').onclick=toggleLang;
fitStage();
buildMapCards();
applyLang();
requestAnimationFrame(loop);
</script>
